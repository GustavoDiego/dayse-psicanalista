<section id="hero" class="hero">
  <!-- Background image -->
  <div class="hero__bg">
    <img src="images/hero-abstract.png" alt="" aria-hidden="true" loading="eager">
    <div class="hero__overlay"></div>
  </div>

  <div class="hero__content">
    <!-- Decorative gold line -->
    <div class="hero__line" appFadeIn [appFadeInDelay]="1"></div>

    <span class="hero__label" appFadeIn [appFadeInDelay]="1">Psicanálise Clínica</span>

    <h1 class="hero__title" appFadeIn [appFadeInDelay]="2">
      Encontre <span class="text-gold">clareza</span><br>
      no que você sente
    </h1>

    <p class="hero__text" appFadeIn [appFadeInDelay]="3">
      Um espaço seguro para escutar o que há de mais profundo em você.
      A psicanálise abre caminhos para o autoconhecimento e a transformação.
    </p>

    <a
      [href]="whatsappLink"
      target="_blank"
      rel="noopener noreferrer"
      class="btn btn--primary hero__cta"
      appFadeIn
      [appFadeInDelay]="4"
    >
      <span>Liberte seu inconsciente</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <!-- Scroll indicator -->
    <div class="hero__scroll" appFadeIn [appFadeInDelay]="5">
      <div class="hero__scroll-line"></div>
      <span>Explore</span>
    </div>
  </div>
</section>
