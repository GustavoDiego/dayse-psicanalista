<section id="hero" class="hero">
  <!-- Background image -->
  <div class="hero__bg">
    <img src="images/hero-abstract-v2.png" alt="" aria-hidden="true" loading="eager">
    <div class="hero__overlay"></div>
  </div>

  <div class="hero__content">
    <!-- Decorative gold line -->
    <div class="hero__line" appFadeIn [appFadeInDelay]="1"></div>

    <span class="hero__label" appFadeIn [appFadeInDelay]="1">Psicanálise Clínica</span>

    <h1 class="hero__title" appFadeIn [appFadeInDelay]="2">
      Psicanálise Pernambucana para o <span class="text-gold">Mundo</span>
    </h1>

    <p class="hero__text" appFadeIn [appFadeInDelay]="3">
      Escuta sensível e rigor clínico: Atendimento Online para todo o Brasil e Presencial em Recife.
    </p>

    <a [href]="whatsappLink" target="_blank" rel="noopener noreferrer" class="btn btn--primary hero__cta" appFadeIn
      [appFadeInDelay]="4">
      <span>Liberte seu inconsciente</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M5 12h14M12 5l7 7-7 7" />
      </svg>
    </a>

    <!-- Scroll indicator -->
    <div class="hero__scroll" appFadeIn [appFadeInDelay]="5">
      <div class="hero__scroll-line"></div>
      <span>Explore</span>
    </div>
  </div>
</section>
