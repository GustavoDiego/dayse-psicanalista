<header class="header" [class.header--scrolled]="isScrolled()" [class.header--open]="isMenuOpen()">
  <div class="header__container">
    <!-- Wordmark -->
    <a class="header__logo" (click)="scrollTo('hero')" role="button" tabindex="0" aria-label="Ir para o início"
      (keydown.enter)="scrollTo('hero')">
      <span class="header__wordmark">Dayse Silva</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="header__nav" [class.header__nav--open]="isMenuOpen()" id="main-nav" aria-label="Menu Principal">
      <a class="header__link" (click)="scrollTo('introducao')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('introducao')"><!-- Introdução removed --> </a>
      <a class="header__link" (click)="scrollTo('sobre')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('sobre')">Sobre</a>
      <a class="header__link" (click)="scrollTo('abordagem')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('abordagem')"><!-- Abordagem removed --> </a>
      <a class="header__link" (click)="scrollTo('para-quem')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('para-quem')"><!-- Para Quem removed --> </a>
      <a class="header__link" (click)="scrollTo('reflexoes')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('reflexoes')">Reflexões</a>
      <!-- <a class="header__link" (click)="scrollTo('pernambuco')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('pernambuco')">Raízes</a> removed -->
      <a class="header__link" (click)="scrollTo('credenciais')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('credenciais')">Formação</a>
      <a class="header__link header__link--cta" (click)="scrollTo('contato')" role="button" tabindex="0"
        (keydown.enter)="scrollTo('contato')">Contato</a>
    </nav>

    <!-- Hamburger -->
    <button class="header__hamburger" [class.header__hamburger--open]="isMenuOpen()" (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()" aria-controls="main-nav" aria-label="Alternar menu de navegação">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<!-- Overlay -->
@if (isMenuOpen()) {
<div class="header__overlay" (click)="closeMenu()" aria-hidden="true"></div>
}
