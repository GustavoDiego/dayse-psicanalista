<section id="credenciais" class="section section--alt credentials">
  <div class="section__container">
    <div class="credentials__header text-center">
      <span class="section__label" appFadeIn>Formação</span>
      <div class="gold-line gold-line--center" appFadeIn></div>

      <h2 class="section__title" appFadeIn [appFadeInDelay]="1">
        Trajetória na <span class="text-gold">psicanálise</span>
      </h2>

      <p class="section__text" appFadeIn [appFadeInDelay]="2">
        Minha trajetória na psicanálise iniciou-se em 2007, consolidando uma escuta que alia a
        experiência de vida ao rigor técnico.
      </p>
    </div>

    <div class="credentials__timeline">
      @for (item of credentials; track item.year; let i = $index) {
      <div class="credentials__item" appFadeIn [appFadeInDelay]="i + 1">
        <div class="credentials__year">{{ item.year }}</div>
        <div class="credentials__line">
          <div class="credentials__dot"></div>
        </div>
        <div class="credentials__info">
          <h3 class="credentials__title">{{ item.title }}</h3>
          <p class="credentials__institution">{{ item.institution }}</p>
        </div>
      </div>
      }
    </div>
  </div>
</section>
